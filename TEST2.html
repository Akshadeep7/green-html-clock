<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Green Digital Clock</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: black;
            font-family: 'Century Gothic', 'URW Gothic L', 'Apple Gothic', Futura, sans-serif;
            color: #38e07a; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            width: 95vw; /* Slightly widened container */
            text-align: center;
        }

        .time {
            font-size: 19vw; /* Dialed back slightly */
            line-height: 1;
            font-weight: normal;
            letter-spacing: 0.5vw;
            white-space: nowrap; /* Forces text to stay on one line */
        }

        .divider {
            width: 100%;
            height: 1vw; 
            min-height: 4px; 
            background-color: #38e07a;
            margin: 3.5vh 0; 
        }

        .date {
            font-size: 13vw; /* Dialed back slightly */
            line-height: 1;
            font-weight: normal;
            letter-spacing: 0.5vw;
            white-space: nowrap; /* Forces text to stay on one line */
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="time" id="time">00:00:00</div>
        <div class="divider"></div>
        <div class="date" id="date">SUN, 01 JAN</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            const hours = now.getHours().toString().padStart(2, '0');
            const mins = now.getMinutes().toString().padStart(2, '0');
            const secs = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${mins}:${secs}`;
            
            const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            
            const dayName = days[now.getDay()];
            const dayNum = now.getDate(); 
            const monthName = months[now.getMonth()];
            
            document.getElementById('date').textContent = `${dayName}, ${dayNum} ${monthName}`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
