<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Green Digital Clock with Waves</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: black;
            font-family: 'Century Gothic', 'URW Gothic L', 'Apple Gothic', Futura, sans-serif;
            color: #38e07a; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* FIXED LAYER: z-index is now 0 so it sits ON TOP of the black background */
        #wave-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0; 
        }

        /* FIXED LAYER: position: relative and z-index: 10 keeps text on top */
        .clock-container {
            display: flex;
            flex-direction: column;
            width: 95vw; 
            text-align: center;
            position: relative; 
            z-index: 10; 
        }

        .time {
            font-size: 19vw; 
            line-height: 1;
            font-weight: normal;
            letter-spacing: 0.5vw;
            white-space: nowrap; 
        }

        .divider {
            width: 100%;
            height: 1vw; 
            min-height: 4px; 
            background-color: #38e07a;
            margin: 3.5vh 0; 
            box-shadow: 0 0 15px rgba(56, 224, 122, 0.6); 
        }

        .date {
            font-size: 13vw; 
            line-height: 1;
            font-weight: normal;
            letter-spacing: 0.5vw;
            white-space: nowrap; 
        }
    </style>
</head>
<body>

    <canvas id="wave-canvas"></canvas>

    <div class="clock-container">
        <div class="time" id="time">00:00:00</div>
        <div class="divider"></div>
        <div class="date" id="date">SUN, 01 JAN</div>
    </div>

    <script>
        // --- CLOCK LOGIC ---
        function updateClock() {
            const now = new Date();
            
            const hours = now.getHours().toString().padStart(2, '0');
            const mins = now.getMinutes().toString().padStart(2, '0');
            const secs = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${mins}:${secs}`;
            
            const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            
            const dayName = days[now.getDay()];
            const dayNum = now.getDate(); 
            const monthName = months[now.getMonth()];
            
            document.getElementById('date').textContent = `${dayName}, ${dayNum} ${monthName}`;
        }

        updateClock();
        setInterval(updateClock, 1000);

        // --- WAVE ANIMATION LOGIC ---
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawWaves() {
            ctx.clearRect(0, 0, width, height);
            
            let time = Date.now() / 1500; 

            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(0, height); 
                
                for (let x = 0; x <= width; x += 20) {
                    let y = height * 0.55 
                          + Math.sin(x * 0.002 + time * (0.5 + i * 0.2)) * (height * 0.15) 
                          + Math.sin(x * 0.005 - time * (0.3 + i * 0.1)) * (height * 0.1); 
                    
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(width, height); 
                ctx.closePath();
                
                // INCREASED BRIGHTNESS: From 0.04 to 0.08 base opacity
                ctx.fillStyle = `rgba(56, 224, 122, ${0.08 + i * 0.04})`;
                ctx.fill();
            }
            
            requestAnimationFrame(drawWaves);
        }

        drawWaves();
    </script>
</body>
</html>
